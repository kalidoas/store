[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.curl", "php83Extensions.fileinfo", "php83Extensions.openssl", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan storage:link && php artisan db:seed --class=ProductSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT"
